<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Free online JSON pretty printer, validator and minifier. Runs entirely in your browser — nothing is uploaded." />
    <meta name="theme-color" content="#0f172a" />
    <title>JSON Pretty Print</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230ea5e9'/%3E%3Ctext x='50%25' y='54%25' text-anchor='middle' font-family='monospace' font-size='34' font-weight='700' fill='white'%3E%7B%7D%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <header class="topbar">
        <div class="brand">
            <span class="logo" aria-hidden="true">{ }</span>
            <h1>JSON Pretty Print</h1>
        </div>
        <div class="topbar-actions">
            <span class="badge" title="All processing happens locally in your browser">100% client-side</span>
            <button id="themeToggle" class="icon-btn" title="Toggle theme" aria-label="Toggle theme">&#9788;</button>
        </div>
    </header>

    <main class="container">
        <section class="toolbar" aria-label="Actions">
            <div class="toolbar-group">
                <button id="formatBtn" class="btn primary" title="Pretty print JSON (Ctrl+Enter)">Pretty Print</button>
                <button id="minifyBtn" class="btn" title="Minify JSON">Minify</button>
                <button id="validateBtn" class="btn" title="Validate JSON">Validate</button>
            </div>
            <div class="toolbar-group">
                <label class="inline-field">
                    Indent:
                    <select id="indentSelect" title="Indentation">
                        <option value="2" selected>2 spaces</option>
                        <option value="4">4 spaces</option>
                        <option value="tab">Tab</option>
                    </select>
                </label>
                <label class="inline-field checkbox">
                    <input type="checkbox" id="sortKeys" />
                    Sort keys
                </label>
            </div>
            <div class="toolbar-group">
                <button id="sampleBtn" class="btn ghost" title="Load sample JSON">Sample</button>
                <button id="loadFileBtn" class="btn ghost" title="Load a .json file">Load File</button>
                <input id="fileInput" type="file" accept=".json,application/json,text/plain" hidden />
                <button id="clearBtn" class="btn ghost danger" title="Clear input and output">Clear</button>
            </div>
        </section>

        <section class="panes">
            <div class="pane">
                <div class="pane-header">
                    <h2>Input</h2>
                    <div class="pane-actions">
                        <button id="pasteBtn" class="link-btn" title="Paste from clipboard">Paste</button>
                    </div>
                </div>
                <div class="editor">
                    <div id="inputGutter" class="gutter" aria-hidden="true"></div>
                    <textarea
                        id="input"
                        spellcheck="false"
                        autocomplete="off"
                        autocorrect="off"
                        autocapitalize="off"
                        wrap="off"
                        placeholder='Paste JSON here, e.g. {"hello":"world","items":[1,2,3]}'
                    ></textarea>
                </div>
            </div>

            <div class="pane">
                <div class="pane-header">
                    <h2>Output</h2>
                    <code id="pathDisplay" class="path" title="JSON path of clicked item — click to copy"></code>
                    <div class="pane-actions">
                        <button id="expandAllBtn" class="link-btn" title="Expand all">Expand</button>
                        <button id="collapseAllBtn" class="link-btn" title="Collapse all">Collapse</button>
                        <button id="copyBtn" class="link-btn" title="Copy output">Copy</button>
                        <button id="downloadBtn" class="link-btn" title="Download as .json">Download</button>
                    </div>
                </div>
                <pre id="output" class="output" tabindex="0" aria-label="Formatted JSON output" data-placeholder="Formatted JSON will appear here."></pre>
            </div>
        </section>

        <div id="status" class="status" role="status" aria-live="polite"></div>
    </main>

    <footer class="footer">
        <span>Built with vanilla HTML/CSS/JS &middot; Hosted on Azure Static Web Apps (Free)</span>
    </footer>

    <script src="app.js"></script>
</body>
</html>
